mes</li></ul><p><strong>Required Preparation</strong></p><p><ul><li>Read chapters 10 and 11</li></ul></p></p>","DescripSave":false,"Outcomes":[{"Enum":"2.5","Desc":"Describe how models, diagrams, and prototypes support the project requirements."},{"Enum":"2.6","Desc":"Construct functional and non-functional requirements as part of a Software Requirements Specification document."}]},{"WeekNum":10,"Delivery":["Synchronous - Online"],"Description":"<h3>Nonfunctional Requirements</h3><p><strong>Agenda</strong></p><p><ul><li>Introduction to nonfunctional requirements</li><li>External and internal quality attributes</li><li>Practice writing nonfunctional requirements</li></ul><p><strong>Required Preparation</strong></p><p><ul><li>Read chapter 14</li></ul></p></p>","DescripSave":false,"Outcomes":[{"Enum":"2.6","Desc":"Construct functional and non-functional requirements as part of a Software Requirements Specification document."},{"Enum":"2.7","Desc":"Identify external and internal quality attributes that describe how well a system works."}]},{"WeekNum":11,"Delivery":["Synchronous - Online"],"Description":"<h3>Validating and Prioritizing the Requirements</h3><p><strong>Agenda</strong></p><p><ul><li>Validating the requirements</li><li>Prioritizing the requirements</li><li>Prioritization techniques</li><li>Introduce GA2: Release Plan</li></ul><p><strong>Required Preparation</strong></p><p><ul><li>Read chapters 16 and 17</li></ul></p></p>","DescripSave":false,"Outcomes":[{"Enum":"2.8","Desc":"Describe the requirements validation process for achieving a requirements baseline."},{"Enum":"2.9","Desc":"Identify requirements prioritization techniques and the benefits of each."}]},{"WeekNum":12,"Delivery":["Synchronous - Online"],"Description":"<h3>Beyond Requirements Development</h3><p><strong>Agenda</strong></p><p><ul><li>Project estimation and scheduling</li><li>Architecture design</li><li>Test planning</li></ul><p><strong>Required Preparation</strong></p><p><ul><li>Read chapter 19</li></ul></p></p>","DescripSave":false,"Outcomes":[{"Enum":"2.10","Desc":"Explain the pre-development phase activities conducted after the requirements have been developed."}]},{"WeekNum":13,"Delivery":["Synchronous - Online"],"Description":"<h3>In-Class Working Session</h3><p>Use this time to work on your assignments. This will be a drop-in session to get help from your instructor as needed.</p>","DescripSave":false,"Outcomes":[]},{"WeekNum":14,"Delivery":["Synchronous - Online"],"Description":"<h3><strong>Requirements on Agile Projects</strong></h3><p><strong>Agenda</strong></p><p><ul><li>Agile vs waterfall project methodologies</li><li>Agile approach to requirements development</li></ul><p><strong>Required Preparation</strong></p><p><ul><li>Read chapter 20</li></ul></p></p>","DescripSave":false,"Outcomes":[{"Enum":"3.1","Desc":"Explain the difference between the waterfall method and the Agile Method of product development."},{"Enum":"3.2","Desc":"Describe how requirements are developed and managed throughout the lifecycle of an Agile project."}]},{"WeekNum":15,"Delivery":["Synchronous - Online"],"Description":"<h3><span style=\"font-weight: bolder;\">In-Class Quiz</span></h3><p>Your 4th and final quiz will be held in the first hour of class time. It follows the same open-book, 30-minute format as all previous quizzes.</p><p><br></p><p><br></p>","DescripSave":false,"Outcomes":[]}]}</script>
